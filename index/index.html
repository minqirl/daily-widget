<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily-widget</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="widget-frame">
    <div class="widget">
        <div class="welcome-card">
        <img class="welcome-bg" src="https://minqirl.github.io/daily-widget/images/bienvenidabg.png" 
        alt="Fondo de bienvenida">
            <h1 id="welcome-message"> 
                Mensaje de bienvenida
            </h1>
        </div>

<div class="today-section">
    <h2 class="today-title">
        Today is:
    </h2>
    <img class="today-bg"
     src="https://minqirl.github.io/daily-widget/images/today-bg.png" 
     alt="Fondo de hoy">
    <div class="today-content">
    <p id="today-date" class="today-date">Fecha</p>
    <h1 id="today-time" class="today-time">00:00</h1>
</div>
<div class="left-section">
   <img class="left-image"
   src="https://minqirl.github.io/daily-widget/images/image-left.png" 
   alt="Imagen de la izquierda">
    <div class="weather-section">
    <p class="weather-temp" id="weather-temp">--°</p>
    <p class="weather-desc" id="weather-desc">Loading...</p>
    </div>
</div>
</div>
<div class="verse-section">

    <div class="verse-box">
        <p class="verse-text">
        "Have I not commanded you? Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go."
        </p>

        <p class="verse-reference">
            Joshua 1:9
        </p>
    </div>

</div>
    </div>
</div>
<script src="js/script.js">
</script>
</body>
</html>
